<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <!-- viewport-fit=cover so the layout extends under the status bar / notch.
       interactive-widget=resizes-content so the on-screen keyboard SHRINKS the
       layout (Android WebView doesn't resize the view on its own) — keeps the
       "Continuer" button reachable above the keyboard. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
  <title>Kubuno</title>
  <!-- Apply the saved theme before first paint to avoid a light-theme flash. -->
  <script>
    (function () {
      var t = localStorage.getItem('kubuno-theme') || 'system';
      if (t === 'system') t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.dataset.theme = t;
    })();
  </script>
  <!-- DM Sans — same typeface as the core web shell. Falls back to the system
       stack when offline. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" />
  <style>
    /* Tokens aligned on the core (frontend/src/theme.css). Mobile shell only
       needs a small subset. */
    :root {
      --accent:       #1a73e8;
      --accent-h:     #1557b0;
      --bg:           #f1f4f8;
      --surface:      #ffffff;
      --border:       #e0e0e0;
      --border-strong:#bdc1c6;
      --text:         #202124;
      --muted:        #5f6368;
      --danger:       #d93025;
      --radius:       14px;
    }
    :root[data-theme="dark"] {
      --accent:       #8ab4f8;
      --accent-h:     #aecbfa;
      --bg:           #131314;
      --surface:      #1e1f20;
      --border:       #3c4043;
      --border-strong:#5f6368;
      --text:         #e8eaed;
      --muted:        #9aa0a6;
      --danger:       #f28b82;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "DM Sans", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      /* Respect the status bar / gesture areas. */
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .wrap {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      /* Top-anchored (not centered) so the "Continuer" button stays above the
         on-screen keyboard, which overlays the WebView without resizing it. */
      justify-content: flex-start;
      align-items: center;
      padding: 12vh 24px 24px;
      gap: 28px;
    }
    .hidden { display: none !important; }
    /* "Reconnecting" state shown to returning users before the auto-redirect. */
    .reconnect { display: flex; flex-direction: column; align-items: center; gap: 18px; width: 100%; max-width: 420px; }
    .reconnect .to { font-size: 16px; color: var(--muted); text-align: center; }
    .reconnect .to b { color: var(--text); font-weight: 600; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .link {
      margin-top: 4px;
      background: none; border: none; padding: 8px;
      color: var(--accent); font-size: 15px; font-weight: 600;
      width: auto; cursor: pointer;
    }
    :root[data-theme="dark"] .link { color: var(--accent); }
    .brand { display: flex; flex-direction: column; align-items: center; gap: 14px; text-align: center; }
    .logo {
      width: 76px; height: 76px;
      display: grid; place-items: center;
      background: var(--accent);
      color: #fff;
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 6px 20px rgba(26,115,232,.30);
    }
    :root[data-theme="dark"] .logo { color: #131314; }
    .logo svg { width: 100%; height: 100%; }
    .brand-name { font-size: 30px; font-weight: 700; letter-spacing: -.5px; }
    .brand-sub  { font-size: 15px; color: var(--muted); margin-top: 2px; }
    form { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 8px; }
    label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
    input {
      width: 100%;
      font: inherit;
      font-size: 17px; /* >=16px so iOS/Android don't zoom on focus */
      padding: 15px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input::placeholder { color: var(--border-strong); }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 18%, transparent); }
    button {
      margin-top: 10px;
      width: 100%;
      font: inherit;
      font-size: 17px; font-weight: 600;
      padding: 16px;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      transition: background .15s, opacity .15s, transform .05s;
    }
    :root[data-theme="dark"] button { color: #131314; }
    button:active { transform: scale(.99); }
    button:disabled { opacity: .6; }
    .error {
      color: var(--danger);
      font-size: 14px;
      text-align: center;
      min-height: 18px;
    }
    .hint { font-size: 13px; color: var(--muted); text-align: center; max-width: 420px; line-height: 1.5; }
  </style>
</head>
<body>
  <!-- Kubuno shield-K logo -->
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
    <symbol id="logo-kubuno" viewBox="0 0 321 346">
      <g transform="translate(0,346) scale(0.1,-0.1)" fill="currentColor" stroke="none">
        <path d="M264 3307 c-3 -8 -3 -434 -1 -948 3 -913 3 -936 24 -1009 70 -249 198 -454 419 -672 125 -123 303 -268 328 -268 3 0 5 654 4 1452 l-3 1453 -383 3 c-313 2 -383 0 -388 -11z"/>
        <path d="M1187 3313 c-4 -3 -7 -680 -7 -1504 l0 -1498 27 -19 c38 -27 279 -165 354 -202 l61 -31 61 32 c34 17 87 47 118 65 31 19 60 34 64 34 3 0 26 14 51 30 l44 31 0 729 c0 608 2 731 14 742 7 7 112 110 233 228 120 118 343 336 496 484 l277 269 -2 306 -3 306 -204 3 -203 2 -87 -83 c-47 -47 -151 -147 -231 -225 l-145 -140 -5 -299 -5 -299 -60 -62 c-32 -34 -63 -62 -67 -62 -4 0 -9 262 -10 583 l-3 582 -381 3 c-209 1 -383 -1 -387 -5z"/>
        <path d="M2217 1782 l-118 -117 1 -265 2 -265 225 -225 224 -225 61 64 c133 140 264 349 319 508 l20 58 -143 138 c-294 284 -459 442 -466 444 -4 1 -60 -51 -125 -115z"/>
      </g>
    </symbol>
  </svg>

  <div class="wrap">
    <div class="brand">
      <div class="logo"><svg viewBox="0 0 321 346" fill="currentColor" aria-hidden="true"><use href="#logo-kubuno"/></svg></div>
      <div>
        <div class="brand-name">Kubuno</div>
        <div class="brand-sub">Votre cloud, partout</div>
      </div>
    </div>

    <!-- Returning user: auto-reconnect to the saved server, with an escape. -->
    <div class="reconnect hidden" id="reconnect">
      <div class="spinner"></div>
      <div class="to">Connexion à <b id="reconnect-host"></b>…</div>
      <button type="button" class="link" id="change-server">Changer de serveur</button>
    </div>

    <!-- First launch (or after "Changer de serveur"): enter the server. -->
    <div id="enter" class="hidden" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:28px;">
      <form id="connect">
        <label for="server">Serveur</label>
        <input id="server" name="server" type="url" inputmode="url" autocapitalize="none"
               autocomplete="url" autocorrect="off" spellcheck="false"
               placeholder="https://cloud.exemple.fr" value="https://dev.kubuno.com" />
        <button type="submit" id="go">Continuer</button>
        <div class="error" id="error"></div>
      </form>

      <div class="hint">
        Saisissez l'adresse de votre serveur Kubuno.<br />
        La connexion se fait ensuite sur votre instance.
      </div>
    </div>
  </div>

  <script>
    // Mobile shell = thin wrapper. We collect the server URL, then hand the
    // WebView over to the Kubuno web app itself (which handles authentication
    // and renders every module). No local-folder sync, no native multi-window:
    // those are desktop-only concepts.
    var KEY = 'kubuno-mobile-server';
    var input     = document.getElementById('server');
    var form      = document.getElementById('connect');
    var err       = document.getElementById('error');
    var go        = document.getElementById('go');
    var enterEl   = document.getElementById('enter');
    var reconnect = document.getElementById('reconnect');

    // Normalize: trim, default to https://, drop a trailing slash.
    function normalize(raw) {
      var v = (raw || '').trim();
      if (!v) return null;
      if (!/^https?:\/\//i.test(v)) v = 'https://' + v;
      try {
        var u = new URL(v);
        if (!u.hostname) return null;
        return u.origin;
      } catch (e) {
        return null;
      }
    }

    // Top-level navigation: the Kubuno web SPA takes over the WebView (it owns
    // authentication and renders every module).
    function connect(origin) {
      localStorage.setItem(KEY, origin);
      window.location.href = origin;
    }

    function showForm() {
      reconnect.classList.add('hidden');
      enterEl.classList.remove('hidden');
      // Prefer the last-used server; otherwise keep the markup default value.
      var saved = localStorage.getItem(KEY);
      if (saved) input.value = saved;
      input.focus();
      // Caret at the end so the pre-filled value is easy to edit.
      var v = input.value; input.value = ''; input.value = v;
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      err.textContent = '';
      var origin = normalize(input.value);
      if (!origin) { err.textContent = "Adresse de serveur invalide."; return; }
      go.disabled = true;
      go.textContent = 'Connexion…';
      connect(origin);
    });

    // Returning user: auto-reconnect to the saved server after a brief moment,
    // leaving a window to bail out to the form via "Changer de serveur" (so a
    // stale/typo'd server never traps the user — the web app replaces this page).
    var saved = localStorage.getItem(KEY);
    if (saved) {
      document.getElementById('reconnect-host').textContent =
        saved.replace(/^https?:\/\//, '');
      reconnect.classList.remove('hidden');
      var timer = setTimeout(function () { connect(saved); }, 1400);
      document.getElementById('change-server').addEventListener('click', function () {
        clearTimeout(timer);
        showForm();
      });
    } else {
      showForm();
    }
  </script>
</body>
</html>
