name: app-release

# Builds the Tauri desktop app for all desktop OSes. Tauri's bundler produces
# the native installers on each runner: .deb/AppImage (Linux), .msi (Windows),
# .dmg (macOS). On a v* tag the artifacts are attached to a GitHub Release.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  app:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  label: linux,      args: '' }
          - { os: windows-latest, label: windows,    args: '' }
          - { os: macos-latest,   label: macos-arm,  args: '--target aarch64-apple-darwin' }
          - { os: macos-13,       label: macos-intel, args: '--target x86_64-apple-darwin' }
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }   # full history: build id needs the commit count

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.label == 'macos-arm' && 'aarch64-apple-darwin' || matrix.label == 'macos-intel' && 'x86_64-apple-darwin' || '' }}

      # Linux WebView + tray dependencies.
      - name: Install Linux deps
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: 'Kubuno Desktop ${{ github.ref_name }}'
          releaseDraft: true
